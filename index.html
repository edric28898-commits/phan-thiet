<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamMind Mockup</title>
<style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#EEF2F7;font-family:system-ui;min-height:100vh;display:flex;justify-content:center;padding:20px 12px}
    .wrapper{width:100%;max-width:520px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.15)}

    .ui-header{background:#0A1628;padding:14px 18px;display:flex;align-items:center;gap:10px;color:white}
    .hdr-dot{width:8px;height:8px;border-radius:50%;background:#00C2D4}
    .hdr-title{font-size:13px;font-weight:500}

    .ui-body{padding:16px;display:flex;flex-direction:column;gap:18px}

    .step-divider{display:flex;align-items:center;gap:8px;padding:6px 0}
    .step-line{flex:1;height:1px;background:#E2EAF4}
    .step-label{font-size:9px;font-family:monospace;color:#9AABB8;letter-spacing:1px}

    .row{display:flex;gap:10px;align-items:flex-start}
    .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px}
    .av-linh{background:#EDE9FE;color:#5B21B6}
    .av-thao{background:#FEE2E2;color:#991B1B}
    .av-sm{background:#0A1628;color:#00C2D4}
    .msg-name{font-size:11.5px;font-weight:600;color:#6B7A8D;margin-bottom:4px}
    .msg-time{font-size:10px;color:#9AABB8}
    .badge-sm{font-size:9px;background:#0A1628;color:#00C2D4;padding:1px 5px;border-radius:3px}
    .txt{font-size:13.5px;color:#1A2332;line-height:1.5;background:#F7F9FC;border-radius:12px 12px 12px 4px;padding:10px 13px;max-width:85%}
    .txt-agent{font-size:13.5px;color:#1A2332;line-height:1.5;background:#F7F9FC;border-radius:12px 12px 12px 4px;padding:10px 13px;max-width:85%;border-left:4px solid #00C2D4}
    .mention{color:#1E6FE8;font-weight:500}

    .action-card{border:2px solid #1E6FE8;border-radius:12px;overflow:hidden;background:#FFFFFF;margin-top:4px}
    .card-hdr{background:#1E6FE8;padding:10px 14px;display:flex;align-items:center;gap:8px;color:white}
    .card-hdr-icon{font-size:18px}
    .card-hdr-label{font-size:13px;font-weight:600}

    .card-body{padding:14px}
    .card-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

    .ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .ba-before .ba-label{color:#E53E3E}
    .ba-after .ba-label{color:#38A169}
    .ba-label{font-size:10px;font-weight:600;margin-bottom:4px}
    .ba-text{font-size:12.5px;line-height:1.5;color:#1F2937}

    .context-toggle{color:#1E6FE8;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:4px;margin:8px 0}
    
    .btns{display:flex;gap:8px;margin-top:12px}
    .btn{
        flex:1;
        padding:8px 12px;
        border-radius:8px;
        font-size:13px;
        font-weight:600;
        cursor:pointer;
        border:none;
        height:40px;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:5px;
    }
    .btn-confirm{background:#1E6FE8;color:white}
    .btn-edit{background:white;color:#1F2937;border:1px solid #CBD5E1}
    .btn-skip{background:white;color:#64748B;border:1px solid #CBD5E1}
</style>
</head>
<body>

<div class="wrapper">
  <div class="ui-header">
    <div class="hdr-dot"></div>
    <div class="hdr-title">Agency Ops — Client X Campaign</div>
  </div>

  <div class="ui-body">

    <!-- STEP 1 -->
    <div class="step-divider">
      <div class="step-line"></div>
      <div class="step-label">STEP 1 — Linh knows what to update, not where</div>
      <div class="step-line"></div>
    </div>
    <div class="row">
      <div class="av av-linh">LN
